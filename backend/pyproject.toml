[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]

[tool.coverage.run]
source = ["app", "model"]
omit = ["tests/*"]

[tool.coverage.report]
show_missing = true
fail_under = 50

[tool.mypy]
python_version = "3.11"
warn_return_any = true
warn_unused_configs = true
ignore_missing_imports = true

[tool.flake8]
max-line-length = 120
exclude = ["__pycache__", ".git", "tests"]

[tool.bandit]
exclude_dirs = ["tests"]
